name: Backend CI/CD - AWS (EC2 & PM2 via Rsync)

on:
  push:
    branches:
      - main
    paths:
      - 'rent-tracker-backend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: rent-tracker-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: rent-tracker-backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Compile Check
        run: npx tsc --noEmit

      - name: Build TypeScript Code
        run: npm run build

      - name: Copy Files to EC2 via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_TARGET_DIR: ${{ secrets.EC2_TARGET_DIR || '/home/ubuntu/rent-tracker-backend' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Create remote target directory if it doesn't exist
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa $EC2_USERNAME@$EC2_HOST "mkdir -p $EC2_TARGET_DIR"
          
          # Sync local dist/ folder and package configs to remote directory efficiently
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            dist/ \
            package.json \
            package-lock.json \
            $EC2_USERNAME@$EC2_HOST:$EC2_TARGET_DIR/

      - name: Install Production Deps & Restart PM2 on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.EC2_TARGET_DIR || '/home/ubuntu/rent-tracker-backend' }}
            
            # Install only production dependencies (avoids dev dependencies and compiles correctly on target host)
            npm ci --omit=dev
            
            # Zero-downtime reload if PM2 process is running, otherwise start fresh
            pm2 describe rent-tracker-backend > /dev/null && pm2 reload rent-tracker-backend || pm2 start dist/index.js --name "rent-tracker-backend"
            
            # Save the PM2 process list to resurrect on system reboot
            pm2 save
