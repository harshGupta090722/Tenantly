name: Backend CI/CD — AWS EC2 (Docker)

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Verify TypeScript compiles before deploying
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript Compile Check
        working-directory: backend
        run: npx tsc --noEmit

      # Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/SocietyOne

            # Pull latest code
            git pull origin main

            # Build and restart Docker container
            cd backend
            docker build -t societyone-backend .

            # Stop and remove old container (ignore errors if not running)
            docker stop societyone-backend 2>/dev/null || true
            docker rm societyone-backend 2>/dev/null || true

            # Run new container with:
            #   --restart unless-stopped  → auto-restart on crash/reboot
            #   -v for uploads            → persist uploaded files across rebuilds
            #   --env-file                → load environment variables
            docker run -d \
              --name societyone-backend \
              --restart unless-stopped \
              -p 4000:4000 \
              -v ~/SocietyOne/backend/uploads:/app/uploads \
              --env-file ~/SocietyOne/backend/.env \
              societyone-backend

            # Cleanup dangling images to save disk space
            docker image prune -f

            # Verify container is running
            sleep 3
            docker ps | grep societyone-backend
